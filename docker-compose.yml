services:
  nginx:
    image: nginx:alpine
    container_name: laravel-vue-pwa-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/app
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/certs:/etc/nginx/certs:ro
    depends_on:
      php:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - laravel-vue-pwa

  php:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: laravel-vue-pwa-php
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php /app/artisan --version"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - laravel-vue-pwa

  redis:
    image: redis:alpine
    container_name: laravel-vue-pwa-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - laravel-vue-pwa

  postgres:
    image: postgres:16-alpine
    container_name: laravel-vue-pwa-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: laravel_vue_pwa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d laravel_vue_pwa"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - laravel-vue-pwa

  mailpit:
    image: axllent/mailpit:latest
    container_name: laravel-vue-pwa-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_MAX_MESSAGES: 5000
      MP_MAX_MESSAGE_SIZE: 10MB
    networks:
      - laravel-vue-pwa

  supervisor:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: laravel-vue-pwa-supervisor
    volumes:
      - .:/app
      - ./docker/supervisor/supervisord.conf:/etc/supervisor/supervisord.conf:ro
      - ./docker/supervisor/queue-worker.sh:/docker/supervisor/queue-worker.sh:ro
      - ./docker/supervisor/queue-default.sh:/docker/supervisor/queue-default.sh:ro
      - ./.env.supervisor:/supervisor.env:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: ["/usr/bin/supervisord", "-c", "/etc/supervisor/supervisord.conf"]
    networks:
      - laravel-vue-pwa

  portainer:
    image: portainer/portainer-ce:latest
    container_name: laravel-vue-pwa-portainer
    ports:
      - "9443:9443"
      - "9000:9000"
    volumes:
      - portainer_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - laravel-vue-pwa

volumes:
  redis_data:
  postgres_data:
  portainer_data:

networks:
  laravel-vue-pwa:
    driver: bridge
