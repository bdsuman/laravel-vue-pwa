services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/usr/share/nginx/html:ro
    depends_on:
      - php
    networks:
      - laravel-vue-network

  php:
    build:
      context: .
      target: app
    image: laravel-vue-pwa-php
    working_dir: /app
    volumes:
      - ./storage:/app/storage
      - ./bootstrap/cache:/app/bootstrap/cache
    depends_on:
      - redis
      - postgres
    networks:
      - laravel-vue-network
    environment:
      APP_ENV: testing
      APP_KEY: base64:dGVzdGluZ2tleWZvcmR1bml0dGVzdGluZ2tleWZvcmR1bml0dGVzdGluZ2tleQ==
      APP_DEBUG: "true"
      DB_CONNECTION: sqlite
      DB_DATABASE: ":memory:"
      CACHE_DRIVER: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - laravel-vue-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: laravel_vue_pwa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - laravel-vue-network

networks:
  laravel-vue-network:
    driver: bridge

volumes:
  redis_data:
  postgres_data:
