# ===============================
# Laravel Vue PWA - Docker Compose
# Alpine + Nginx + Redis + Node
# ===============================

services:
  # -------------------------------
  # Nginx Web Server
  # -------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: laravel-vue-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/usr/share/nginx/html:ro
    depends_on:
      - php
    networks:
      - laravel
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # -------------------------------
  # PHP-FPM Application
  # -------------------------------
  php:
    build:
      context: .
      target: app
      dockerfile: Dockerfile
    container_name: laravel-vue-php
    working_dir: /app
    volumes:
      - ./docker/php.ini:/usr/local/etc/php/php.ini:ro
      - ./docker-entrypoint.sh:/entrypoint:ro
      - ./storage:/app/storage
      - ./bootstrap/cache:/app/bootstrap/cache
    depends_on:
      - redis
      - postgres
    environment:
      - APP_NAME=LaravelVuePWA
      - APP_ENV=local
      - APP_KEY
      - APP_DEBUG=true
      - APP_URL=http://localhost
      - LOG_CHANNEL=stack
      - LOG_LEVEL=debug
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=laravel
      - DB_USERNAME=laravel
      - DB_PASSWORD=laravel_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=null
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - BROADCAST_CONNECTION=log
      - FILESYSTEM_DISK=public
    networks:
      - laravel
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # -------------------------------
  # Redis Cache
  # -------------------------------
  redis:
    image: redis:7-alpine
    container_name: laravel-vue-redis
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - laravel
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # -------------------------------
  # PostgreSQL Database
  # -------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: laravel-vue-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=laravel
      - POSTGRES_USER=laravel
      - POSTGRES_PASSWORD=laravel_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - laravel
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laravel"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  laravel:
    driver: bridge

volumes:
  redis_data:
  postgres_data:
